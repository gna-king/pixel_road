<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PIXEL ROAD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>


    <div id="loading-screen">
        <div class="loading-text">데이터 로딩 중...</div>
        <div class="loading-bar-container">
            <div id="loading-bar"></div>
        </div>
    </div>
    
    <div id="game-container">
        <div id="fade-overlay"></div>
        
        <div id="nav-buttons">
            <button id="prev-btn" onclick="goPrev()">◀ 이전</button>
            <button id="next-btn" onclick="goNext()">다음 ▶</button>
        </div>
        
        <div id="background"></div>
        
        <div id="photo-gallery">
            <div id="photo1" class="photo-frame"></div>
            <div id="photo2" class="photo-frame"></div>
            <div id="photo3" class="photo-frame"></div>
        </div>
        
        <div id="day-counter" style="display:none;">D+1</div>
        
        <div id="scene-title" style="display:none;"></div>
        
        <div id="character"></div>
        <div id="char-hyungmin"></div>
        
        <div id="phone-popup" style="display:none;">
            <div class="phone-screen">
                <div class="chat-header">형민오빠</div>
                <div class="chat-box" id="chat-box"></div>
            </div>
        </div>
        
        <div id="bubble"></div>
        <div id="choices" style="display:none;"></div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
