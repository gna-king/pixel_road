<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PIXEL ROAD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="fade-overlay"></div>
        
        <div id="nav-buttons">
            <button id="prev-btn" onclick="goPrev()">◀ 이전</button>
            <button id="next-btn" onclick="goNext()">다음 ▶</button>
        </div>
        
        <div id="background"></div>
        
        //여기 사징니 추가되는 부분이다.
        <div id="photo-gallery">
            <div id="photo1" class="photo-frame"></div>
            <div id="photo2" class="photo-frame"></div>
            <div id="photo3" class="photo-frame"></div>
        </div>
        
        <div id="bubble"></div>

        <div id="bubble"></div>
        <div id="character"></div>
        
        <div id="choices" style="display:none;">
            <p id="question">우리가 처음 만난 계절은?</p>
            <button onclick="answer('spring')">봄 (정답)</button>
            <button onclick="answer('winter')">겨울</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
